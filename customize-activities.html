<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="css/styles.css" media="screen" title="no title">
	<title>Customize Activities | Todo Tab</title>
</head>

<body>
	<section class="Customize">
		<div class="Customize__Section">
			<img src="images/icon128.png" class="logo"/>

			<h1>Customize Activities</h1>
			<p>Expand your activity list by adding and managing new tags.</p>

			<input class="ActivityName" type="text" placeholder="Eg. project, project/todo"/>

			<ol class="GenericActivities"></ol>
		</div>
	</section>
	
	<img class="bird__1" src="images/birds.png"/>
	<img class="bird__2" src="images/birds.png"/>
	<img class="bird__3" src="images/birds.png"/>
	<img class="cloud__1" src="images/cloud-1.png"/>
	<img class="cloud__2" src="images/cloud-1.png"/>

	<script id="genericactivities-tpl" type="text/x-template">
		<li class="GenericActivity" data-id="{%=o.id%}">
			<p class="GenericActivity__Name {%=o.color%}">{%=o.name%}</p>
			<ul class="GenericActivity__Colors Colors" data-activity="{%=o.name%}">
				{% for (var i = 0; i < o.colors.length; i++) { %}
					{% if(o.colors[i] === o.color) { %}
						<li class="Colors__Color Colors__Color--{%=o.colors[i]%} Colors__SelectedColor" data-color="{%=o.colors[i]%}"></li>
					{% } else { %}
						<li class="Colors__Color Colors__Color--{%=o.colors[i]%}" data-color="{%=o.colors[i]%}"></li>
					{% } %}
				{% } %}
			</ul>
			<button type="button" class="GenericActivity__Delete" data-id="{%=o.id%} name="button">✖</button>
		</li>
	</script>

	<script type="text/javascript" src="js/tmpl.min.js"></script>
	<script type="text/javascript" src="js/zepto.min.js"></script>
	<script type="text/javascript" src="js/customize-activity.js"></script>
</body>
</html>
